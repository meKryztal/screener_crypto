function _syncCanvas(cv){
  const rect = cv.el.getBoundingClientRect()
  const dpr  = window.devicePixelRatio || 1
  const w = Math.round(rect.width*dpr), h = Math.round(rect.height*dpr)
  if(cv.el.width!==w || cv.el.height!==h){
    cv.el.width=w; cv.el.height=h
  }
  return {w:rect.width, h:rect.height, dpr}
}

// ── Core canvas oscillator renderer ──
// data: [{time (unix sec), value, color?}]
// options: {yMin, yMax, label, lineColor, fillColor, type:'bar'|'line'}
function _drawOscCanvas(cv, data, options={}){
  if(!cv.el || !cv.ctx) return
  const {w, h} = _syncCanvas(cv)
  const dpr = window.devicePixelRatio||1
  const ctx = cv.ctx
  ctx.setTransform(dpr,0,0,dpr,0,0)
  ctx.clearRect(0,0,w,h)
  if(!data || !data.length) return

  // Price scale background — transparent main area, only price scale bg
  const c0 = getChartColors()
  ctx.clearRect(0,0,w,h)

  // Grid line
  ctx.strokeStyle = c0.grid
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w,0); ctx.stroke()

  const PRICE_SCALE_W = 62
  const drawW = w - PRICE_SCALE_W - 2
  if(drawW < 4) return

  // Map time → x using main chart time scale
  // Filter data to visible range
  const visRange = mainChart.timeScale().getVisibleRange()
  const tMin = visRange ? visRange.from : data[0].time
  const tMax = visRange ? visRange.to   : data[data.length-1].time

  const visible = data.filter(d => d.time >= tMin-1 && d.time <= tMax+1)
  if(!visible.length) return

  // Y range
  const vals = visible.map(d=>d.value).filter(v=>isFinite(v))
  if(!vals.length) return
  let yMin = options.yMin ?? Math.min(...vals)
  let yMax = options.yMax ?? Math.max(...vals)
  if(yMin===yMax){ yMin-=1; yMax+=1 }
  // Add 8% padding when not explicitly set
  const pad = (yMax - yMin) * 0.08
  if(options.yMin == null) yMin -= pad
  if(options.yMax == null) yMax += pad
  const yRange = yMax - yMin
  const toY = v => h - 4 - ((v-yMin)/yRange)*(h-8)

  // Price scale right side
  ctx.fillStyle = c0.bg
  ctx.fillRect(drawW+2, 0, PRICE_SCALE_W, h)
  ctx.strokeStyle = c0.border
  ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(drawW+2,0); ctx.lineTo(drawW+2,h); ctx.stroke()
  // Scale labels
  ctx.fillStyle = c0.text
  ctx.font = '9px monospace'
  ctx.textAlign = 'left'
  ctx.textBaseline = 'middle'
  const fmtV = v => v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v.toFixed(1)
  ctx.fillText(fmtV(yMax), drawW+5, 8)
  ctx.fillText(fmtV((yMax+yMin)/2), drawW+5, h/2)
  ctx.fillText(fmtV(yMin), drawW+5, h-6)

  // Zero line for delta
  if(options.zeroline){
    const zy = toY(0)
    ctx.strokeStyle='rgba(120,130,150,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3])
    ctx.beginPath(); ctx.moveTo(0,zy); ctx.lineTo(drawW,zy); ctx.stroke()
    ctx.setLineDash([])
  }

  const type = options.type || 'bar'

  if(type==='bar'){
    // Bar width: use main chart bar spacing as reference
    const tsRange = tMax - tMin || 1
    const pxPerSec = drawW / tsRange
    // Step between bars
    const step = visible.length>1 ? (visible[visible.length-1].time - visible[0].time)/(visible.length-1) : 60
    const barW = Math.max(1, Math.floor(pxPerSec * step * 0.8))

    for(const d of visible){
      const x = mainChart.timeScale().timeToCoordinate(d.time)
      if(x===null || x<0 || x>drawW) continue
      const y = toY(d.value)
      const zero = toY(0)
      const top  = Math.min(y, zero)
      const bh   = Math.abs(y - zero)
      ctx.fillStyle = d.color || options.fillColor || 'rgba(24,144,255,0.6)'
      ctx.fillRect(x - barW/2, top, barW, Math.max(1, bh))
    }
  } else {
    // Line
    ctx.strokeStyle = options.lineColor || '#00bcd4'
    ctx.lineWidth   = 1.5
    ctx.lineJoin    = 'round'
    ctx.beginPath()
    let started = false
    let firstX = 0, lastX = 0
    for(const d of visible){
      const x = mainChart.timeScale().timeToCoordinate(d.time)
      if(x===null || x<0 || x>drawW) continue
      const y = toY(d.value)
      if(!started){ ctx.moveTo(x,y); firstX=x; started=true }
      else ctx.lineTo(x,y)
      lastX=x
    }
    ctx.stroke()
    // Fill under line — from firstX to lastX, no bleed to corners
    if(started && options.fillColor){
      ctx.lineTo(lastX, toY(yMin)); ctx.lineTo(firstX, toY(yMin)); ctx.closePath()
      ctx.fillStyle = options.fillColor
      ctx.fill()
    }
  }

  // Label drawn by HTML .sub-pane-label — skip canvas label

  // ── Crosshair vertical line + value label ──
  if(_crosshairX !== null && _crosshairX >= 0 && _crosshairX <= drawW){
    const cx = _crosshairX
    // Vertical dashed line
    ctx.save()
    ctx.strokeStyle = c0.crosshair || 'rgba(120,130,160,0.6)'
    ctx.lineWidth   = 1
    ctx.setLineDash([4, 3])
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke()
    ctx.setLineDash([])

    // Find nearest data point to crosshair time
    if(_crosshairTime !== null && data.length){
      let nearest = null, bestDist = Infinity
      for(const d of data){
        const dist = Math.abs(d.time - _crosshairTime)
        if(dist < bestDist){ bestDist=dist; nearest=d }
      }
      if(nearest && isFinite(nearest.value)){
        const cy = toY(nearest.value)
        // Horizontal dashed line at value
        ctx.strokeStyle = c0.crosshair || 'rgba(120,130,160,0.4)'
        ctx.lineWidth = 1
        ctx.setLineDash([4, 3])
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(drawW, cy); ctx.stroke()
        ctx.setLineDash([])

        // Value badge on price scale
        const label = fmtV(nearest.value)
        const bx    = drawW + 4
        const bw    = PRICE_SCALE_W - 4
        ctx.fillStyle   = c0.crosshair || 'rgba(42,51,80,0.9)'
        ctx.fillRect(bx, cy - 8, bw, 16)
        ctx.fillStyle   = '#fff'
        ctx.font        = 'bold 9px monospace'
        ctx.textAlign   = 'left'
        ctx.textBaseline = 'middle'
        ctx.fillText(label, bx + 3, cy)

        // Dot on line
        ctx.beginPath()
        ctx.arc(cx, cy, 3, 0, Math.PI*2)
        ctx.fillStyle = options.lineColor || (nearest.value >= 0 ? '#0ecb81' : '#f6465d')
        ctx.fill()
      }
    }
    ctx.restore()
  }
}

function _redrawAllOscillators(){
  if(indState.volume && volData)   _drawOscCanvas(_cv.volume, volData,  {type:'bar',  label:'Volume', yMin:0})
  if(indState.delta  && deltaData) _drawOscCanvas(_cv.delta,  deltaData,{type:'bar',  label:'Delta',  zeroline:true})
  if(indState.oi     && oiData)    _drawOscCanvas(_cv.oi,     oiData,   {type:'line', label:'OI',     lineColor:'#00bcd4', fillColor:'rgba(0,188,212,0.10)'})

// ── Calc helpers ──
function calcSMA(bars, period){
  const out=[]
  for(let i=0;i<bars.length;i++){
    if(i<period-1)continue
    let sum=0; for(let j=i-period+1;j<=i;j++) sum+=bars[j].close
    out.push({time:bars[i].time, value:sum/period})
  }
  return out
}
function calcEMA(bars, period){
  const k=2/(period+1), out=[]
  let ema=null
  for(let i=0;i<bars.length;i++){
    if(ema===null){
      if(i<period-1)continue
      ema=bars.slice(0,period).reduce((s,b)=>s+b.close,0)/period
    } else {
      ema=bars[i].close*k+ema*(1-k)
    }
    out.push({time:bars[i].time, value:ema})
  }
  return out
}
function calcVolume(bars){
  return bars.map(b=>({
    time:  b.time,
    value: b.volume,
    color: b.close>=b.open ? 'rgba(14,203,129,0.60)' : 'rgba(246,70,93,0.60)',
  }))
}
function calcDelta(bars){
  return bars.map(b=>{
    const range   = b.high-b.low || 1e-12
    const buyFrac = (b.close-b.low) / range
    const buyVol  = b.volume * buyFrac
    const delta   = buyVol - (b.volume - buyVol)
    return {
      time:  b.time,
      value: delta,
      color: delta>=0 ? 'rgba(14,203,129,0.70)' : 'rgba(246,70,93,0.70)',
    }
  })
}

function toggleIndicator(key, enabled){
  indState[key]=enabled
  saveSettings()

  if(key==='cluster'){
    if(!enabled) absorption=[]
    else if(activeSymbol) loadAbsorption(activeSymbol, activeTF)
    drawBubbles()
    return
  }

  if(key==='sma20'){
    if(smaSeries){ _removeSeries(mainChart,smaSeries); smaSeries=null }
    if(enabled && currentBars.length){
      smaSeries = mainChart.addLineSeries({
        color:'#f0b90b', lineWidth:1.5,
        priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
      })
      smaSeries.setData(calcSMA(currentBars,20))
    }
    return
  }

  if(key==='ema200'){
    if(emaSeries){ _removeSeries(mainChart,emaSeries); emaSeries=null }
    if(enabled && currentBars.length){
      emaSeries = mainChart.addLineSeries({
        color:'#9467bd', lineWidth:1.5,
        priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
      })
      emaSeries.setData(calcEMA(currentBars,200))
    }
    return
  }

  if(key==='volume'){
    _showPane('paneVolume', enabled)
    if(!enabled){ volData=null }
    else if(currentBars.length){ volData=calcVolume(currentBars) }
    setTimeout(resize, 50)
    scheduleRedraw()
    return
  }

  if(key==='delta'){
    _showPane('paneDelta', enabled)
    if(!enabled){ deltaData=null }
    else if(currentBars.length){ deltaData=calcDelta(currentBars) }
    setTimeout(resize, 50)
    scheduleRedraw()
    return
  }

  if(key==='oi'){
    _showPane('paneOI', enabled)
    if(!enabled){ oiData=null }
    else if(activeSymbol){ loadOI(activeSymbol, activeTF) }
    setTimeout(resize, 50)
    return
  }

  if(key==='dom'){
    if(enabled){
      const sel=document.getElementById('domDepthSel')
      if(sel) sel.value=String(domDepth)
      if(activeSymbol) _startDomRefresh()
    } else {
      _stopDomRefresh()
      _domData=null
      _domCtx.clearRect(0,0,_domCanvas.width,_domCanvas.height)
    }
    return
  }
  if(key==='limitlevels'){
    if(enabled && activeSymbol) _startLimitLevels(activeSymbol)
    else { _stopLimitLevels(); drawBubbles() }
    return
  }
}

  const el=document.getElementById('ind-poc-all')
  if(el){ el.checked=val; el.indeterminate=false }
  _applyPOCChange()
  saveSettings()
}
function _syncPOCMaster(){
  const any  = ['4H','1D','1W','1M'].some(l=>pocState[l])
  const all  = ['4H','1D','1W','1M'].every(l=>pocState[l])
  const el   = document.getElementById('ind-poc-all')
  if(!el) return
  el.checked       = any
  el.indeterminate = any && !all
}

// Вызывается из togglePOC — обновляет чекбокс и управляет индикатором
function _applyPOCChange(){
  _syncPOCMaster()
  const any = ['4H','1D','1W','1M'].some(l=>pocState[l])
  if(!any){
    clearPocSeries()   // все выключены — убираем линии с графика
  } else if(activeSymbol){
    loadPOC(activeSymbol)  // хотя бы один включён — перегружаем
  }
}

function showToast(msg){
  let t=document.getElementById('_toast')
  if(!t){
    t=document.createElement('div'); t.id='_toast'
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--t1);font-size:11px;padding:6px 14px;border-radius:5px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s'
    document.body.appendChild(t)
  }
  t.textContent=msg; t.style.opacity='1'
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0', 3000)
}

// ── Rebuild all enabled indicators after new bars loaded ──
function rebuildIndicators(bars){
  // SMA
  if(smaSeries){ _removeSeries(mainChart,smaSeries); smaSeries=null }
  if(indState.sma20 && bars.length){
    smaSeries = mainChart.addLineSeries({color:'#f0b90b',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
    smaSeries.setData(calcSMA(bars,20))
  }
  // EMA
  if(emaSeries){ _removeSeries(mainChart,emaSeries); emaSeries=null }
  if(indState.ema200 && bars.length){
    emaSeries = mainChart.addLineSeries({color:'#9467bd',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
    emaSeries.setData(calcEMA(bars,200))
  }
  // Volume
  _showPane('paneVolume', !!indState.volume)
  volData = (indState.volume && bars.length) ? calcVolume(bars) : null
  // Delta
  _showPane('paneDelta', !!indState.delta)
  deltaData = (indState.delta && bars.length) ? calcDelta(bars) : null
  // OI
  _showPane('paneOI', !!indState.oi)
  if(!indState.oi) oiData = null
  setTimeout(()=>{ resize(); _redrawAllOscillators() }, 100)
}

// ── OI ──
async function loadOI(symbol, tf){
  tf = tf || activeTF
  try{
    const r = await fetch(`/api/oi/${encodeURIComponent(symbol)}?tf=${tf}`)
    if(!r.ok){
      console.warn('OI: HTTP', r.status, 'for', symbol)
      // Show pane label with error hint but don't toast
      const lbl = document.querySelector('#paneOI .sub-pane-label')
      if(lbl) lbl.textContent = 'OI  (нет данных)'
      return
    }
    const data = await r.json()
    if(!data || !data.length){
      console.warn('OI: empty data for', symbol)
      const lbl = document.querySelector('#paneOI .sub-pane-label')
      if(lbl) lbl.textContent = 'OI  (нет данных)'
      return
    }
    const lbl = document.querySelector('#paneOI .sub-pane-label')
    if(lbl) lbl.textContent = 'OI'
    oiData = data
    _redrawAllOscillators()
  }catch(e){
    console.warn('OI load failed:', e)
    const lbl = document.querySelector('#paneOI .sub-pane-label')
    if(lbl) lbl.textContent = 'OI  (нет данных)'
  }
}


function setTF(tf){
  if(tf===activeTF&&activeSymbol)return
  activeTF=tf
  document.querySelectorAll('.tb-btn[data-tf]').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf))
  saveSettings()
  if(!activeSymbol)return
  loadChart(activeSymbol,tf)

document.getElementById('modeEl').addEventListener('change',function(){

  document.getElementById('pctLbl').style.display=auto?'':'none'
  document.getElementById('pctEl').style.display=auto?'':'none'
  document.getElementById('volLbl').style.display=auto?'none':''
  document.getElementById('volEl').style.display=auto?'none':''

function applySettings(){
  if(!activeSymbol) return
  if(indState.cluster) loadAbsorption(activeSymbol)
  if(['4H','1D','1W','1M'].some(l=>pocState[l])) loadPOC(activeSymbol)
  saveSettings()
}

function stepInput(dir){
  const mode = document.getElementById('modeEl').value
  if(mode === 'Auto'){
    const el = document.getElementById('pctEl')
    const val = parseFloat(el.value) || 99
    let next
    if(dir > 0){
      // Вверх: шаг зоны куда идём
      if(val < 99)       next = Math.min(99,  Math.round((val + 0.5) / 0.5) * 0.5)
      else if(val < 99.9)next = Math.min(99.9, Math.round((val + 0.1) / 0.1) * 0.1)
      else               next = Math.min(100,  Math.round((val + 0.01)/ 0.01)* 0.01)
    } else {
      // Вниз: шаг текущей зоны, но при переходе границы — snap к ней
      if(val <= 99 + 1e-9)      next = Math.max(50,   Math.round((val - 0.5) / 0.5) * 0.5)
      else if(val <= 99.9 + 1e-9)next = Math.max(99,   Math.round((val - 0.1) / 0.1) * 0.1)
      else                      next = Math.max(99.9,  Math.round((val - 0.01)/ 0.01)* 0.01)
    }
    next = Math.min(100, Math.max(50, next))
    el.value = next >= 99.9 ? next.toFixed(2) : next.toFixed(1)
  }
  if(activeSymbol) loadAbsorption(activeSymbol, activeTF)
}

// ─── Resize ───
function resize(){
  const mainPane = document.getElementById('mainPane')
  let savedRange=null
  try{ savedRange=mainChart.timeScale().getVisibleLogicalRange() }catch(e){}
  mainChart.applyOptions({width:mainPane.clientWidth, height:mainPane.clientHeight})
  if(savedRange){ try{ mainChart.timeScale().setVisibleLogicalRange(savedRange) }catch(e){} }
  syncPreviewCanvas()
  drawBubbles()
  _redrawAllOscillators()
  _domRedrawOnResize()
}
new ResizeObserver(resize).observe(document.getElementById('chartsWrap'))
new ResizeObserver(resize).observe(document.getElementById('mainPane'))
_initCanvases()

// ─── Sub-pane drag resize ───
;(function(){
  const MIN_H = 40, MAX_H = 400
  let _drag = null

  document.querySelectorAll('.sub-pane-resize').forEach(handle=>{
    handle.addEventListener('mousedown', e=>{
      e.preventDefault()
      const paneEl  = document.getElementById(handle.dataset.pane)
      const chartId = handle.dataset.chart
      _drag = { paneEl, chartId, startY: e.clientY, startH: paneEl.clientHeight }
      document.body.style.cursor = 'ns-resize'
      document.body.style.userSelect = 'none'
    })
  })

  document.addEventListener('mousemove', e=>{
    if(!_drag) return
    const newH = Math.min(MAX_H, Math.max(MIN_H, _drag.startH - (e.clientY - _drag.startY)))
    _drag.paneEl.style.height = newH + 'px'
    resize()
  })

  document.addEventListener('mouseup', ()=>{
    if(!_drag) return
    _drag = null
    document.body.style.cursor = ''
    document.body.style.userSelect = ''
  })
})()
setTimeout(resize,50)

// ─── Helpers ───
function fmtVol(v){
  if(v==null||isNaN(v))return'—'
  if(v>=1e9)return(v/1e9).toFixed(2)+'B'
  if(v>=1e6)return(v/1e6).toFixed(2)+'M'
  if(v>=1e3)return(v/1e3).toFixed(1)+'K'
  return v.toFixed(1)
}
function fmt(v){
  if(v==null)return'—'
  return v>=1000?v.toLocaleString('en',{maximumFractionDigits:2}):v>=1?v.toFixed(4):v.toFixed(6)
}

// ─── Polling ───
async function pollStatus(){
  try{
    const s=await fetch('/api/status').then(r=>r.json())
    document.getElementById('loadFill').style.width=s.percent+'%'
    document.getElementById('loadTxt').textContent=`${s.loaded}/${s.total} (${s.percent}%)`
    if(s.ready)document.getElementById('loadWrap').style.display='none'
  }catch(e){}
}

async function pollSymbols(){
  try{
    const fresh=await fetch('/api/symbols').then(r=>r.json())
    symbols=fresh
    // #9: если порядок/фильтр не менялся — только данные, без DOM-перестановок
    updateScreenerRows()
  }catch(e){}
}

function startAutoRefresh(){
  setInterval(()=>{
    if(activeSymbol){
      if(indState.cluster) loadAbsorption(activeSymbol,activeTF)
      if(['4H','1D','1W','1M'].some(l=>pocState[l])) loadPOC(activeSymbol,activeTF)
    }
  },15000)
  setInterval(()=>{
    if(sortField==='anomaly') loadAnomalies()
  },35000)
}

// ─── Bootstrap: load settings from server, then start UI ───
async function _bootstrap(){
  await _loadSettingsFromServer()
  // Re-apply saved values now that _saved is populated
  if(_saved.tf) activeTF=_saved.tf
  if(_saved.sortField){sortField=_saved.sortField;sortAsc=!!_saved.sortAsc}
  if(_saved.pocState) Object.assign(pocState,_saved.pocState)
  if(_saved.indState)  Object.assign(indState,_saved.indState)
  if(_saved.indPanelOpen!=null) indPanelOpen=_saved.indPanelOpen
  if(_saved.theme){ currentTheme=_saved.theme; document.documentElement.setAttribute('data-theme',currentTheme); updateThemeBtn(); applyChartTheme() }
  if(_saved.utcOffset !== undefined){ utcOffset=_saved.utcOffset; applyUTC() }

  pollStatus(); pollSymbols()
  setInterval(pollStatus, 10000)
  setInterval(pollSymbols, 30 * 1000)

// ─── Восстановление UI из сохранённых настроек ───
;(function applyInitialSettings(){
  // _saved already loaded from server before this runs
  const s=_saved
  // TF кнопки
  document.querySelectorAll('.tb-btn[data-tf]').forEach(b=>b.classList.toggle('active',b.dataset.tf===activeTF))
  // POC кнопки
  for(const label in pocState){
    const btn=document.querySelector(`.poc-btn[data-poc="${label}"]`)
    if(btn)btn.classList.toggle('on',pocState[label])
  }
  // Sort tab
  if(s.sortField){
    document.querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'))
    const stBtn=document.getElementById('st-'+sortField)
    if(stBtn)stBtn.classList.add('active')
    const SORT_LABELS={name:'Имя',change:'24h%',vol24h:'Vol 24h',spike_2h_24h:'2H/24H'}
    const lbl=document.getElementById('sortColLabel')
    if(lbl)lbl.textContent=SORT_LABELS[sortField]||sortField
  }
  // Mode / pct / vol
  if(s.mode){
    const modeEl=document.getElementById('modeEl')
    if(modeEl){
      modeEl.value=s.mode
      const auto=s.mode==='Auto'
      document.getElementById('pctLbl').style.display=auto?'':'none'
      document.getElementById('pctEl').style.display=auto?'':'none'
      document.getElementById('volLbl').style.display=auto?'none':''
      document.getElementById('volEl').style.display=auto?'none':''
    }
  }
  if(s.pct){const el=document.getElementById('pctEl');if(el)el.value=s.pct}
  if(s.vol){const el=document.getElementById('volEl');if(el)el.value=s.vol}

  // Restore indicator checkboxes
  for(const key in indState){
    const el=document.getElementById('ind-'+key)
    if(el)el.checked=indState[key]
  }
  // Restore POC panel — single master checkbox
  const allOn = ['4H','1D','1W','1M'].every(l=>pocState[l])
  const pocAllEl = document.getElementById('ind-poc-all')
  if(pocAllEl) pocAllEl.checked = allOn
  _syncPOCMaster()
  // Restore accordion open state
  if(indPanelOpen){
    const panel=document.getElementById('indPanel')
    const btn=document.getElementById('indToggleBtn')
    const arrow=document.getElementById('indToggleArrow')
    if(panel){panel.classList.add('open');btn&&btn.classList.add('open');if(arrow)arrow.textContent='▴';setTimeout(resize,100)}
  }
  // Restore screener visibility
  if(_saved.screenerVisible===false){
    screenerVisible=true;toggleScreener()
  }
  // Restore DOM depth select value
  const _domSel=document.getElementById('domDepthSel')
  if(_domSel) _domSel.value=String(domDepth)
  // Restore Big Bid/Ask params and sync to backend
  if(s.limitMult!=null){const el=document.getElementById('limitMultEl');if(el)el.value=s.limitMult}
  if(s.limitMult!=null){
    applyLimitParams().catch(()=>{})
  }
})()

const waitFirst=setInterval(async()=>{
  const list=await fetch('/api/symbols').then(r=>r.json()).catch(()=>[])
  const first=list.find(s=>s.loaded)
  if(first){
    clearInterval(waitFirst)
    symbols=list; renderList()
    // Загружаем последний открытый символ, или первый доступный
    const sym=(_saved.symbol&&list.find(s=>s.symbol===_saved.symbol&&s.loaded))?_saved.symbol:first.symbol
    loadChart(sym, activeTF)
    saveSettings()
    startAutoRefresh()
  }
},1500)
} // end _bootstrap
_bootstrap()
